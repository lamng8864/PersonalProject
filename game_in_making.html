<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game in the making</title>
</head>
<style>
  #game {
    display:block;
    background-color: beige;
    border-radius: 16px;
    margin:100px auto;
  }
</style>
<body>
    <canvas id="game" width="1200" height="800"></canvas>
</body>
<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
//snake box
  function reDrawGrid(){
    ctx.clearRect(0,0,1200,800);
    ctx.fillStyle = 'rgb( 0 0 0 / 50% )';
    ctx.fillRect(200,0,800,800);
    //grid
    for (let i = 0; i < canvas.width; i += blockL){
      for (let j = 0; j < canvas.height; j +=blockL){
        ctx.strokeStyle = 'rgb( 255 255 255 / 70% )';
        ctx.strokeRect(i,j,blockL,blockL);
        ctx.fillText(`(${i},${j})`,i,j);        //co-ordinate remove after
      }
    }
  }
//snake head
  let blockL = 50;
  let headxCoor= 200;
  let headyCoor= 400;
  function drawEyes(){
    let heads = blockL - 2
    let ix = headxCoor+201
    let iy = headyCoor+1
    if (currentKeyHold === undefined){  
      ctx.fillStyle = "rgb(255 255 255 )";
      ctx.fillRect(ix + 28,iy +28,12,12)
      ctx.fillRect(ix + 28,iy+8,12,12)
      ctx.fillStyle = "rgb(0 0 0 )";
      ctx.fillRect(ix+32,iy+30,8,8)
      ctx.fillRect(ix+32,iy+10,8,8)
    }
    if (currentKeyHold === kup){
      ctx.fillStyle = "rgb(255 255 255 )";
      ctx.fillRect(ix + 8,iy +8,12,12)
      ctx.fillRect(ix + 28,iy+8,12,12)
      ctx.fillStyle = "rgb(0 0 0 )";
      ctx.fillRect(ix+10,iy+8,8,8)
      ctx.fillRect(ix+30,iy+8,8,8)
    }
    if (currentKeyHold === kdown){
      ctx.fillStyle = "rgb(255 255 255 )";
      ctx.fillRect(ix + 8,iy +28,12,12)
      ctx.fillRect(ix + 28,iy +28,12,12)
      ctx.fillStyle = "rgb(0 0 0 )";
      ctx.fillRect(ix+10,iy+32,8,8)
        ctx.fillRect(ix+30,iy+32,8,8)
    }
    if (currentKeyHold === kleft){
      ctx.fillStyle = "rgb(255 255 255 )";
      ctx.fillRect(ix + 8,iy +8,12,12)
      ctx.fillRect(ix + 8,iy +28,12,12)
      ctx.fillStyle = "rgb(0 0 0 )";
      ctx.fillRect(ix+8,iy+30,8,8)
      ctx.fillRect(ix+8,iy+10,8,8)
    }
    if (currentKeyHold === kright){
      ctx.fillStyle = "rgb(255 255 255 )";
      ctx.fillRect(ix + 28,iy +28,12,12)
      ctx.fillRect(ix + 28,iy+8,12,12)
      ctx.fillStyle = "rgb(0 0 0 )";
      ctx.fillRect(ix+32,iy+30,8,8)
      ctx.fillRect(ix+32,iy+10,8,8)
    }
  }
  function drawHead(){
    ctx.fillStyle = "rgb(194 143 120 )"
    ctx.fillRect(headxCoor+201,headyCoor+1,blockL-2,blockL-2);
    drawEyes()
  }
  //make snake head move

//do i need to indent 

//first, need to make event listener for keys     
let currentKeyHold;                            //hold key to know direction 
let headIntervalId;                         //hold current interval id so that i can be clear if the movement direction is changed. 
let bodyIntervalId;
let playerSpeed = 1                            //change speed here (0.5 is half, 1 is original, 2 is double)
let speed = 100/playerSpeed;
const kup = 'ArrowUp'
const kdown = 'ArrowDown'
const kleft = 'ArrowLeft'
const kright = 'ArrowRight'

function headStartMoving(direction){
  clearInterval(headIntervalId);                //clear prev interval
  headIntervalId = setInterval(direction,speed);
  counterKeeper = 0;
}
function bodyStartMoving(direction){
  clearInterval(bodyIntervalId);                
  bodyIntervalId = setInterval(direction,speed);
}

function arrowKeysMovement(keyInput){
  if(keyInput.key === kup || keyInput.key === kdown ||keyInput.key === kright || keyInput.key === kleft){
    keyInput.preventDefault()
    if(currentKeyHold !== keyInput.key){
      if (currentKeyHold !== kdown && keyInput.key === kup){                           
        currentKeyHold = kup
        headStartMoving(headMoveUp)
        bodyStartMoving(bodyMoveUp)
      } else if(currentKeyHold !== kup && keyInput.key === kdown){
        currentKeyHold = kdown
        headStartMoving(headMoveDown)
        // setTimeout(bodyStartMoving(bodyMoveDown(drawBody)),100)
      } else if(currentKeyHold !== kright && currentKeyHold!==undefined && keyInput.key === kleft){
        currentKeyHold = kleft
        headStartMoving(headMoveLeft)
        // setTimeout(bodyStartMoving(bodyMoveLeft(drawBody)),100)

      } else if(currentKeyHold !== kleft && keyInput.key === kright){
        currentKeyHold = kright
        headStartMoving(headMoveRight)
        // setTimeout(bodyStartMoving(bodyMoveRight(drawBody)),100)

      }
    }
  }
}
                                                   //testing, remove later 
setInterval(() => {
  console.log(currentKeyHold)
  console.log(bodyxCoor,bodyyCoor)
  console.log(headxCoor+201,headyCoor+1)
}, speed);
                                                    //
// 2nd, make it move at constant speed
function headMoveRight(){
  if (headxCoor<750 && currentKeyHold === kright){
    headxCoor += blockL
    reDrawGrid();
    drawHead();
  }
}
function headMoveLeft(){
  if (headxCoor>0  && currentKeyHold === kleft){
    headxCoor -= blockL
    reDrawGrid();
    drawHead();
  }
}
function headMoveDown(){
  if (headyCoor<750 && currentKeyHold === kdown){
    headyCoor += blockL
    reDrawGrid();
    drawHead();
  }
}
function headMoveUp(){
  if (headyCoor>0  && currentKeyHold === kup){
    headyCoor -= blockL
    reDrawGrid();
    drawHead();
  }
}
//this is to draw body part 1 
let bodyyCoor = headyCoor +1
let bodyxCoor = headxCoor +201

function bodyMoveUp(){
  if (currentKeyHold === kup && counterKeeper === 1){
    bodyyCoor = headyCoor + 1 - blockL
    drawBody(); 
  }
}
function bodyMoveDown(){
  if (headyCoor<750 && currentKeyHold === kdown){
    headyCoor += blockL
    reDrawGrid();
    drawBody();
  }
}
function bodyMoveLeft(){
  if (headxCoor>0  && currentKeyHold === kleft){
    headxCoor -= blockL
    reDrawGrid();
    drawBody();
  }
}
function bodyMoveRight(){
  if (headxCoor<750 && currentKeyHold === kright){
    headxCoor += blockL
    reDrawGrid();
    drawBody();
  }
}

// redraw grid, can't just separate them

//next step here


//draw body then number 1-...

function drawBody(){
  ctx.fillStyle = "rgb(194 143 120 )";
  ctx.fillRect(bodyyCoor,bodyxCoor,blockL-2,blockL-2);
}
//make a counter 
let counterKeeper = 0;
setInterval(() => {
  counterKeeper ++
  console.log(counterKeeper)
}, speed);


//your drawing space 
reDrawGrid();
drawHead();
// drawBody(1)
document.addEventListener("keydown",arrowKeysMovement,) // need ot take only 1 key input per seconds or so )

</script>
</html>
