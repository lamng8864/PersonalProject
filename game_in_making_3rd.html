<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game in the making</title>
</head>
<style>
  #game {
    display:block;
    background-color: beige;
    border-radius: 16px;
    margin:100px auto;
  }
</style>
<body>
    <canvas id="game" width="1200" height="800"></canvas>
</body>
<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let blockL = 50;
// color of main table
  function reDrawGrid(){
    ctx.clearRect(200,0,800,800);
    ctx.fillStyle = 'rgb( 0 0 0 / 50% )';
    ctx.fillRect(200,0,800,800);
// make grid system and make everything based on it 
    for (let i = 200; i < canvas.width-200; i += blockL){
        for (let j = 0; j < canvas.height; j += blockL){
        // ctx.strokeStyle = 'rgb( 255 255 255 / 70% )';
        ctx.strokeRect(i,j,blockL,blockL);
        // ctx.fillText(`(${i},${j})`,i,j);
        }
    }
  }

// x coor convert
  function xCoorConversion(inputXCoor){
    outputXCoor = inputXCoor * blockL + 200
    return outputXCoor
  }
// y coor convert
  function yCoorConversion(inputYCoor){
    
    outputYCoor = inputYCoor * blockL
    return outputYCoor
  }
  
// what about making a whole snake using an obj then 
  let snakeCoor = [[2,7],[2,8],[3,8],[4,8],[5,8]]                         //snake list with coor of blocks
  let xCoor
  let yCoor
  function drawSnake(){
    for (let i = 0; i<snakeCoor.length; i++){
      xCoor = snakeCoor[i][0]                           //transfer value to draw
      yCoor = snakeCoor[i][1]
      console.log(xCoor,yCoor)
      // console.log(xCoorConversion(xCoor),yCoorConversion(yCoor))
      ctx.fillStyle = "rgb(194 143 120 )"
      ctx.fillRect(xCoorConversion(xCoor),yCoorConversion(yCoor),blockL,blockL)
    }
  }
  console.log(snakeCoor[0])
  console.log(snakeCoor[1])
// moving
  let intervalId;
  let currentKeyHold;
//shortening by moving function
  function moving(direction){
    clearInterval(intervalId)
    intervalId = setInterval(()=>{
      snakeCoor.shift()                               
      if(direction === kdown ){
        yCoor +=1
      } else if (direction === kup ){
        yCoor -=1
      } else if (direction === kright ){
        xCoor +=1
      } else if (direction === kleft ){
        xCoor -=1
      }
      snakeCoor.push([xCoor,yCoor])
      reDrawGrid()                                    
      drawSnake()  
      // make game end or stop
      let headPairNum = snakeCoor.length-1
      if ((currentKeyHold === kdown && snakeCoor[headPairNum][1]>14)||(currentKeyHold === kup && snakeCoor[headPairNum][1]<1)||
    (currentKeyHold === kright && snakeCoor[headPairNum][0]>14)||(currentKeyHold === kleft && snakeCoor[headPairNum][0]<1)){
        console.log(snakeCoor[1])
        document.removeEventListener('keydown',drawInProgress)
        clearInterval(intervalId)
        //make game-over screen
      }                                   
    },100)
  }
// var for arrows to make my life easier 
  const kdown = 'ArrowDown'
  const kup = 'ArrowUp'
  const kright = 'ArrowRight'
  const kleft = 'ArrowLeft'
//event listener, main moving mechanics
  document.addEventListener('keydown',drawInProgress)
  function drawInProgress(event){
    if(event.key === kdown || event.key === kup || event.key === kright || event.key === kleft){
      event.preventDefault()  
      if (event.key === kdown && currentKeyHold !== kup && currentKeyHold !== kdown){
        currentKeyHold = event.key                        //stop printing multiple interval 
        moving(currentKeyHold)
      } else if (event.key === kup && currentKeyHold !== kdown && currentKeyHold !== kup){               
        currentKeyHold = event.key                        //repeat
        moving(currentKeyHold)
      } else if (event.key === kright && currentKeyHold !== kleft && currentKeyHold !== kright){             
        currentKeyHold = event.key                        // ^ prevent continious new loop each time key press and going opposite way 
        moving(currentKeyHold)
      } else if (event.key === kleft && currentKeyHold !== kright && currentKeyHold !== kleft){
        currentKeyHold = event.key
        moving(currentKeyHold)
      }
    }
  }
//next is scoring
//die when eat self
                          
//draw here 
  reDrawGrid()
  drawSnake()
</script>
</html>
