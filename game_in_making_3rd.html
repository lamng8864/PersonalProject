<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game in the making</title>
</head>
<style>
  body{
    width: 100%;
    display: flex;
    justify-content: center;
  }
  #game {
    display: inline-block;
    vertical-align: top;
    background-color: beige;
    width:900px;
    height:900px;
    border-radius: 16px 0 0 16px ;
  }
  #side_panel{
    display: inline-block;
    vertical-align: top;
    height:900px;
    width:300px;
    background-color: beige;
    border-radius: 0 16px 16px 0;
    margin:auto;
    /* padding:16px; */
  }
  p{
    font-size:32px;
    padding:32px 16px 
  }
  #current_point{
    padding:0 64px;
    font-size:128px;
    display:block;
    width:100%;
    justify-content: center;
  }
</style>
<body>
    <canvas id="game" width="900" height="900">
    </canvas><div id="side_panel">
        <p>Score: <span id="current_point">0</span></p>
        <p id="speed_changed"></p>
        <p id="game_restart"></p>
    </div>
</body>
<script src="game_script.js"></script>
</html>
